version: 0.2
phases:
  install:
    commands:
      - curl -Lo aws-sam-cli.zip https://github.com/aws/aws-sam-cli/releases/latest/download/aws-sam-cli-linux-x86_64.zip
      - python3 -c "import zipfile; zipfile.ZipFile('aws-sam-cli.zip').extractall('sam-installation')"
      - sudo ./sam-installation/install
      - sam --version
      - npm install
  pre_build:
    commands:
      - npm run test
      - npm prune --production
  build:
    commands:
      - sam package --template-file template.yaml --s3-bucket $S3_BUCKET --output-template-file template-export.yml
artifacts:
  files:
    - template-export.yml
